---
name: CI

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@ed21f2f24f8dd64503750218de024bcf64c7250a
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install dev dependencies
        run: uv sync --group dev --no-install-project --frozen
      - name: Run ruff check
        run: uv run ruff check .
      - name: Run ruff format
        run: uv run ruff format --check .
      - name: Run ty
        run: uv run ty check .

  quick-tests:
    name: Quick Tests
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            python-version: "3.8"
          - runner: ubuntu-latest
            python-version: "3.13"
          - runner: windows-latest
            python-version: "3.8"
          - runner: windows-latest
            python-version: "3.13"
          - runner: macos-latest
            python-version: "3.13"
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@ed21f2f24f8dd64503750218de024bcf64c7250a
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: pytest
        shell: bash
        run: |
          uv sync --all-extras --frozen
          uv run -p ${{ matrix.python-version }} maturin develop
          uv run -p ${{ matrix.python-version }} pytest
      - name: complexipy CLI validation
        shell: bash
        run: |-
          uv run -p ${{ matrix.python-version }} complexipy complexipy --failed
      - name: complexipy exclude pattern validation
        shell: bash
        run: |-
          uv run -p ${{ matrix.python-version }} complexipy tests/src --exclude "exclude_dir/**" --ignore-complexity
          uv run -p ${{ matrix.python-version }} complexipy tests/src --exclude "**/test_exclude*.py" --ignore-complexity
