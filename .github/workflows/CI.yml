name: CI

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
      - name: Install uv
        uses: astral-sh/setup-uv@ed21f2f24f8dd64503750218de024bcf64c7250a
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install dev dependencies
        run: uv sync --group dev --no-install-project --frozen
      - name: Run ruff check
        run: uv run ruff check .
      - name: Run ruff format
        run: uv run ruff format --check .
      - name: Run ty
        run: uv run ty check .

  quick-tests:
    name: Quick Tests
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            python-version: "3.8"
          - runner: ubuntu-latest
            python-version: "3.13"
          - runner: windows-latest
            python-version: "3.13"
          - runner: macos-14
            python-version: "3.13"
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
      - name: Install uv
        uses: astral-sh/setup-uv@ed21f2f24f8dd64503750218de024bcf64c7250a
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: pytest
        shell: bash
        run: |
          uv sync --all-extras --frozen
          uv run -p ${{ matrix.python-version }} maturin develop
          uv run -p ${{ matrix.python-version }} pytest
      - name: complexipy execution
        shell: bash
        run: |
          uv run -p ${{ matrix.python-version }} complexipy complexipy --failed
