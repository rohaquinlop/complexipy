---
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Release
    # Prevent infinite loop: skip release commits and pipeline fix commits
    if: |
      !contains(github.event.head_commit.message, 'chore: release v') &&
      !startsWith(github.event.head_commit.message, 'fix(release):')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use PAT so the tag push triggers the release workflow
          # (GITHUB_TOKEN blocks recursive workflow triggers)
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Determine next version
        id: version
        run: |
          CURRENT=$(grep '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          NEXT=$(git cliff --bumped-version)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"

          if [ "$CURRENT" = "$NEXT" ]; then
            echo "No unreleased changes to publish (current=$CURRENT)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Will release: $CURRENT -> $NEXT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version and update changelog
        if: steps.version.outputs.skip != 'true'
        run: |-
          NEXT="${{ steps.version.outputs.next }}"
          CURRENT="${{ steps.version.outputs.current }}"
          TODAY=$(date +%Y-%m-%d)

          # Bump Cargo.toml
          sed -i "s/^version = \"$CURRENT\"/version = \"$NEXT\"/" Cargo.toml

          # Update CHANGELOG.md: replace [Unreleased] header with the new version
          sed -i "s/## \[Unreleased\]/## [$NEXT] - $TODAY/" CHANGELOG.md
          # Insert a fresh [Unreleased] section after the description line
          awk 'NR==4{print;print "";print "## [Unreleased]";next}1' \
            CHANGELOG.md > /tmp/changelog.md
          mv /tmp/changelog.md CHANGELOG.md

          # Commit, tag, and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock CHANGELOG.md
          git commit -m "chore: release v$NEXT"
          git tag "$NEXT"
          git push origin main --tags
