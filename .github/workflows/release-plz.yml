name: Release-plz

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use PAT so the tag push triggers CI.yml (GITHUB_TOKEN blocks
          # recursive workflow triggers and CI.yml won't fire for PyPI publish)
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Run release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          release-pr: true
          release: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
