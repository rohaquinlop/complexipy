name: Release-plz

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          release-pr: true
          release: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
